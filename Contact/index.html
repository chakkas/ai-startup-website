<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact Sales</title>
  <link rel="stylesheet" href="../style.css">
</head>

<body>

  <!-- Optional: Your navbar stays here -->
  <header class="navbar">
    <div class="nav-container">
      <div class="logo">MetaCognitive AI</div>
      <button class="menu-toggle" onclick="toggleMenu()">☰</button>
      <nav class="nav-links" id="navLinks">
        <a href="../index.html">Home</a>
        <a href="../Ai-Models/index.html">AI Models</a>
        <a href="../Code-Base/index.html">Code Base</a>
        <a href="../Contact/index.html">Contact</a>
      </nav>
    </div>
  </header>

  <!-- ⭐ Latest-style Contact Form -->
  <section class="contact-wrapper">
    <h1>Contact Sales</h1>

    <form id="contactForm" action="https://formspree.io/f/mlgylvpl" method="POST">

      <div class="form-group">
        <input type="text" name="name" required placeholder=" ">
        <label>Name</label>
      </div>

      <div class="form-group">
        <input type="email" name="email" required placeholder=" ">
        <label>Email</label>
      </div>

      <div class="form-group">
        <input type="text" name="company" required placeholder=" ">
        <label>Company</label>
      </div>

      <!-- Phone validation -->
      <div class="form-group">
        <input type="tel" name="phone" placeholder=" "
               pattern="^\+?[0-9]{7,15}$"
               title="Enter a valid phone number with 7–15 digits, optional +">
        <label>Phone (optional)</label>
      </div>

      <!-- Country dropdown -->
      <div class="form-group">
        <input type="tel" name="phone" placeholder=" "
               pattern="^\+?[0-9]{7,15}$"
               title="Enter a valid phone number with 7–15 digits, optional +">
        <label>Phone (optional)</label>
      </div>

      <div class="form-group">
        <select name="country" required>
        <option value="" disabled selected>Select your country</option>
        <option value="US">United States</option>
        <option value="MX">Mexico</option>
        <option value="IN">India</option>
        <option value="UK">United Kingdom</option>
      <!-- Add more countries as needed -->
      </select>
        <label>Country</label>
      </div>


      <div class="form-group">
        <textarea name="message" rows="4" required placeholder=" "></textarea>
        <label>Your Message</label>
      </div>

      <button type="submit" class="submit-btn">Submit</button>

      <p id="form-status"></p>
    </form>
  </section>

  <!-- ⭐ Crusoe-style Form Submission Script -->
  <script>
    const form = document.getElementById('contactForm');
    const status = document.getElementById('form-status');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();

      const data = new FormData(form);

      const response = await fetch(form.action, {
        method: 'POST',
        body: data,
        headers: { 'Accept': 'application/json' }
      });

      if (response.ok) {
        status.innerText = "Thank you! Our team will contact you shortly.";
        form.reset();
      } else {
        status.innerText = "Oops! Something went wrong.";
      }
    });

    function toggleMenu() {
      document.getElementById("navLinks").classList.toggle("show");
    }
  </script>

</body>
</html>
